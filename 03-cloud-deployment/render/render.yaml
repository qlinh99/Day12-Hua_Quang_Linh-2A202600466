# ============================================================
# render.yaml — Infrastructure as Code cho Render
# ============================================================

services:
  # ──────────────────────────────────────
  # Web Service — AI Agent
  # ──────────────────────────────────────
  - type: web
    name: ai-agent
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true

  # ──────────────────────────────────────
  # Redis (Đã sửa lỗi IP Allow List)
  # ──────────────────────────────────────
  - type: redis
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all traffic (hoặc giới hạn IP nếu cần)

# ============================================================
# Lưu ý: 
# "0.0.0.0/0" cho phép mọi IP truy cập vào Redis (vẫn cần password).
# Nếu bạn muốn bảo mật tối đa, hãy thay bằng IP cụ thể của bạn.
# ============================================================